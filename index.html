<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloader AIO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

a.download {
  display: block;
  margin-top: 10px;
  text-align: center;
  background: #22c55e;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

  </style>
</head>
<body>
  <div class="container">
    <h2>Downloader AIO</h2><input type="text" id="urlInput" placeholder="Masukkan link..." />
<button onclick="download()">Download</button>

<div class="result" id="result"></div>

  </div>  <script>
    async function download() {
      const url = document.getElementById("urlInput").value;
      const result = document.getElementById("result");

      result.innerHTML = "Loading...";

      try {
        // coba url dulu
        let res = await fetch(`/api/aio?url=${encodeURIComponent(url)}`);
        let data = await res.json();

        // fallback ke urlv2
        if (!data || data.status === false) {
          res = await fetch(`/api/aio?urlv2=${encodeURIComponent(url)}`);
          data = await res.json();
        }

        if (!data || data.status === false) {
          result.innerHTML = "Gagal ambil data";
          return;
        }

        // ambil data (flexible karena beda API beda format)
        const title = data.title || data.result?.title || "No Title";
        const thumbnail = data.thumbnail || data.result?.thumbnail || "";
        const downloadUrl =
          data.url ||
          data.result?.url ||
          data.result?.video ||
          data.result?.media?.[0]?.url ||
          "";

        result.innerHTML = `
          <p>${title}</p>
          ${thumbnail ? `<img src="${thumbnail}" />` : ""}
          ${downloadUrl ? `<a class="download" href="${downloadUrl}" target="_blank">Download</a>` : ""}
        `;
      } catch (e) {
        result.innerHTML = "Error: " + e.message;
      }
    }
  </script></body>
</html>
